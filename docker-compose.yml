services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ph_user
      POSTGRES_PASSWORD: ph_password
      POSTGRES_DB: ph_bot
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ph_user -d ph_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:docker compose up -d


        max-size: "10m"
        max-file: "3"
